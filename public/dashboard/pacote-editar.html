        <!--Final Menu-->


        <main>
            <!--Cadastro-->
            <div class="caixa-cadastro">
                <h1>Edição de Pacotes</h1>
                <p>Insira os dados abaixo para editar um pacote!</p>

                <div class="campo">
                    <label>Nome do Pacote</label>
                    <input id="iptNomePacote" type="text" placeholder="Ex: Pacote Bom Rio">
                    <span class="error" id="errorNomePacote"></span>
                </div>

                <!--<div class="categorias" style="display: none;">-->
                <div class="select">
                    <label>Local</label>
                    <select id="sltLocal" onchange="carregarDadosLocal()">
                        <option value="Selecione">Selecione</option>
                    </select>
                    <span class="error" id="errorLocal"></span>
                </div>
                <div class="select">
                    <label>Hospedagem</label>
                    <select id="sltHospedagem">
                        <option value="Selecione">Selecione</option>
                    </select>
                    <span class="error" id="errorHospedagem"></span>
                </div>
                <div class="select">
                    <label>Tipo de Hospedagem</label>
                    <select id="sltHosped">
                        <option value="Selecione">Selecione</option>
                        <option value="Hotel">Hotel</option>
                        <option value="Pousada">Pousada</option>
                        <option value="Hostel">Hostel</option>
                    </select>
                    <span class="error" id="errorHosped"></span>
                </div>
                <div class="select">
                    <label>Serviços de Alimentação</label>
                    <select id="sltAlimentacao">
                        <option value="Selecione">Selecione</option>
                    </select>
                    <span class="error" id="errorAlimentacao"></span>
                </div>
                <div class="select">
                    <label>Estabelecimento de Alimentação</label>
                    <select id="sltAlimen">
                        <option value="Selecione">Selecione</option>
                        <option value="Restaurante">Restaurante</option>
                        <option value="Lanchonete">Lanchonete</option>
                        <option value="Bar">Bar</option>
                    </select>
                    <span class="error" id="errorAlimen"></span>
                </div>
                <span id="loading" class="loading"></span>
                <button class="btn-cadastrar" onclick="atualizar()">Salvar alterações</button>

            </div>
        </main>
        <script>
            b_usuario.innerHTML = sessionStorage.NOME_USUARIO || "usuário";

            var errorNomePacote = document.getElementById("errorNomePacote");
            var errorLocal = document.getElementById("errorLocal");
            var errorHospedagem = document.getElementById("errorHospedagem");
            var errorHosped = document.getElementById("errorHosped");
            var errorAlimentacao = document.getElementById("errorAlimentacao");
            var errorAlimen = document.getElementById("errorAlimen");

            function iniciar() {
                listarMunicipio();
                carregarPacote();
            }

            /*function listarMunicipio() {
                fetch("/pacote/listarMunicipio")
                    .then(function (resposta) {
                        return resposta.json();
                    })
                    .then(function (dados) {
                        console.log("ESTOU NO THEN select pacote (cadastro)");

                        var select = document.getElementById("sltLocal");
                        select.innerHTML = `<option value="">Selecione um Municipio</option>`;

                        for (var i = 0; i < dados.length; i++) {
                            select.innerHTML += `

                            ${dados[i].nome}
                        </option>
                    `;
                        }
                        console.log("Municipio carregado com sucesso");
                    })
                    .catch(function (erro) {
                        console.log("Erro ao carregar Municipio:", erro);
                    });
            }*/

            function carregarPacote() {
                var idPacote = sessionStorage.ID_HOSPEDAGEM_EDITAR;

                fetch(`/pacote/buscar/${idPacote}`)
                    .then(function (resposta) {
                        return resposta.json();
                    })
                    .then(function (dados) {
                        console.log("ESTOU NO THEN buscar Pacote");

                        var pacote = dados[0];

                        iptNomePacote.value = pacote.nome;
                        sltLocal.value = pacote.fkMunicipio;
                        sltHospedagem.value = pacote.fkHospedagem;
                        sltAlimentacao.value = pacote.fkEstabelecimento;
                    })
                    .catch(function (erro) {
                        console.log(erro);
                        console.log("Erro ao buscar pacote!");
                    });

                iptNomePacote.value = pacote.nome;
                sltLocal.value = pacote.fkMunicipio;
            }

            function carregarDadosLocal() {
                var fkMunicipio = sltLocal.value;

                if (fkMunicipio == "" || fkMunicipio == "Selecione") {
                    sltHospedagem.innerHTML = `<option value="Selecione">Selecione</option>`;
                    sltAlimentacao.innerHTML = `<option value="Selecione">Selecione</option>`;
                    return;
                }

                listarHospedagem(idMunicipio);
                listarAlimentacao(idMunicipio);
            }

            function listarHospedagem(idMunicipio) {
                fetch(`/pacote/listarHospedagem/${idMunicipio}`)
                    .then(function (resposta) {
                        return resposta.json();
                    })
                    .then(function (dados) {
                        var select = document.getElementById("sltHospedagem");
                        select.innerHTML = `<option value="">Selecione</option>`;

                        for (var i = 0; i < dados.length; i++) {
                            select.innerHTML += `
                            <option value="${dados[i].idHospedagem}">
                                ${dados[i].nome}
                                </option>
                    `;
                        }

                        console.log("Hospedagens carregadas com sucesso");
                    })
                    .catch(function (erro) {
                        console.log("Erro ao carregar hospedagens:", erro);
                    });
            }

            function atualizar() {

                errorNomePacote.innerHTML = "";
                errorLocal.innerHTML = "";
                errorHospedagem.innerHTML = "";
                errorHosped.innerHTML = "";
                errorAlimentacao.innerHTML = "";
                errorAlimen.innerHTML = "";

                var nomePacote = iptNomePacote.value;
                var fkMunicipio = sltLocal.value;
                var fkHospedagem = sltHospedagem.value;
                var hosped = sltHosped.value;
                var fkEstabelecimento = sltAlimentacao.value;
                var alimen = sltAlimen.value;

                var erro = false;

                if (nomePacote == "") {
                    errorNomePacote.innerHTML = "Preencha o nome";
                    erro = true;
                }

                if (fkMunicipio == "") {
                    errorLocal.innerHTML = "Escolha um local";
                    erro = true;
                }

                if (fkHospedagem == "") {
                    errorHospedagem.innerHTML = "Escolha um local";
                    erro = true;
                }

                if (hosped == "") {
                    errorHosped.innerHTML = "Selecione o tipo de hospedagem";
                    erro = true;
                }
                if (fkEstabelecimento == "") {
                    errorAlimentacao.innerHTML = "Escolha um local";
                    erro = true;
                }

                if (alimen == "") {
                    errorAlimen.innerHTML = "Selecione um tipo de estabelecimento";
                    erro = true;
                }


                if (!erro) {

                    fetch("/pacote/atualizar", {
                        method: "PUT",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            idPacote: sessionStorage.ID_PACOTE_EDITAR,
                            nome: nome,
                            fkMunicipio: fkMunicipio,
                            fkHospedagem: fkHospedagem,
                            fkEstabelecimento: fkEstabelecimento,
                        })
                    })
                        .then(function (resposta) {
                            console.log("ESTOU NO THEN atualizar Pacote");

                            if (resposta.ok) {
                                console.log("Pacote atualizado!");
                                window.location = "./pacote.html";
                            } else {
                                console.log("Erro ao atualizar pacote");
                            }
                        })
                        .catch(function (erro) {
                            console.log(erro);
                            console.log("Erro ao atualizar pacote!");
                        });
                }
            }

            function listarAlimentacao(idMunicipio) {
                fetch(`/pacote/listarAlimentacao/${idMunicipio}`)
                    .then(function (resposta) {
                        return resposta.json();
                    })
                    .then(function (dados) {
                        var select = document.getElementById("sltAlimentacao");
                        select.innerHTML = `<option value="">Selecione</option>`;

                        for (var i = 0; i < dados.length; i++) {
                            select.innerHTML += `
                    <option value="${dados[i].idAlimentacao}">
                        ${dados[i].nome}
                    </option>
                    `;
                        }

                        console.log("Alimentações carregadas com sucesso");
                    })
                    .catch(function (erro) {
                        console.log("Erro ao carregar alimentações:", erro);
                    });
            }

        </script>

</body>
