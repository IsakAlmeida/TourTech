<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />
    <script src="../js/sessao.js"></script>
    <script src="./../js/alerta.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"

<body>

    <div class="janela">

        <div class="header-left">
            <h1>TourTech</h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav">
                <a href="./dashboard.html">
                    <h3>Gráficos</h3>
                </a>
            </div>

            <div class="btn-nav-white">
                <a href="./funcionarios.html">
                    <h3>Funcionários</h3>
                </a>
            </div>

            <div class="btn-nav-white">
                <a href="./estabelecimento.html">
                    <h3>Estabelecimento</h3>
                </a>
            </div>
            <div class="btn-nav-white">
                <a href="./mural.html">
                    <h3>Pacotes</h3>
                </a>
            </div>
            <div class="btn-nav-white">
                <a href="./mural.html">
                    <h3>Suporte</h3>
                </a>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>
        <!--Final Menu-->

        <div class="dash">
            <div class="tituloDash">
                <h1>Dashboards</h1>
            </div>

            <div class="kpis">
                <div class="kpi">
                    <div style="font-weight: bold;">Tempo de turismo médio</div>
                    <h1 style="color: green;">3 dias</h1>
                </div>
                <!-- <div class="kpi">
                    <div>Tempo de turismo médio <br>(estrangeiros)</div>
                    <h1>KPI2</h1>
                </div> -->
                <div class="kpi">
                    <div style="font-weight: bold;">País que mais visitam</div>
                    <h1 style="color: green;">Argentina</h1>
                </div>
                <div class="kpi">
                    <div style="font-weight: bold;">Mês com o maior fluxo</div>
                    <h1 style="color: green;">Fevereiro</h1>
                </div>
            </div>
            <div class="superior">
                <div class="bar">
                    <canvas id="myChart"></canvas>
                </div>

                <div class="doughnut">
                    <canvas id="myChart2"></canvas>
                </div>
            </div>

            <div class="line">
                <canvas id="myChart3"></canvas>
            </div>

        </div>
    </div>


</body>

</html>

<script>
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

    let proximaAtualizacao;

    const ctx1 = document.getElementById('myChart');
    new Chart(ctx1, {
        type: 'bar',
        data: {
            labels: ['São Paulo', 'Minas Gerais', 'Espírito Santos', 'Paraná', 'Bahia', 'Outros'],
            datasets: [{
                label: 'Numero de visitantes/ano',
                data: [3763020, 1873347, 595762, 508795, 374890, 2791629],
                backgroundColor: ['rgb(213, 226, 147, 0.5)'],
                borderColor: ['rgb(213, 226, 147)'],
                borderRadius: 6,
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                title: {
                    display: true,
                    text: 'Estados que mais vão para o Rio de Janeiro',
                    color: '#000',
                    font: {
                        size: 20,
                        weight: 'bold'
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });

    const ctx2 = document.getElementById('myChart2');

    new Chart(ctx2, {
        type: 'doughnut',
        data: {
            labels: ['Argentina', 'Chile', 'Estados Unidos', 'França', 'Uruguai', 'Outros'],
            datasets: [{
                label: 'estrangeiros X brasileiros',
                data: [468037, 239465, 185600, 70115, 69707, 433591],
                backgroundColor: [
                    'rgb(213, 226, 147)',
                    'rgb(213, 226, 147)',
                    'rgb(213, 226, 147)',
                    'rgb(213, 226, 147)',
                    'rgb(213, 226, 147)',
                    'rgb(213, 226, 147)'
                ],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                title: {
                    display: true,
                    text: 'Número de turistas por país no ano',
                    color: '#000',
                    padding: {
                        top: 10,
                        bottom: 25 // Espaço entre o texto e a linha
                    },
                    font: {
                        size: 20,
                        weight: 'bold'
                    }
                },

            },
            scales: {
                y: {
                    beginAtZero: true,
                    display: false
                }
            }
        }
    });


    const ctx3 = document.getElementById('myChart3');

    new Chart(ctx3, {
        type: 'line',
        data: {
            labels: ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'],
            datasets: [
                {
                    label: 'Nacional',
                    data: [1070914, 878024, 748070, 693650, 825337, 651342, 836046, 755994, 909291, 754432, 800330, 984993],
                    backgroundColor: ['rgb(213, 226, 147)'],
                    borderWidth: 1
                },
                {
                    label: 'Estrangeiro',
                    data: [158396, 208631, 188502, 82247, 71755, 65680, 82392, 87003, 102988, 123232, 128351, 163338],
                    backgroundColor: ['rgb(213, 226, 147)'],
                    borderWidth: 1
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                title: {
                    display: true,
                    text: 'Número de turistas/mês',
                    color: '#000',
                    font: {
                        size: 20,
                        weight: 'bold'
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });


</script>
