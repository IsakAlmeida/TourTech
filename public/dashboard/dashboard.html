<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />

    <link rel="preconnect" href="https://fonts.gstatic.com">

        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"

</head>

<body>

    <div class="janela">
        <div class="header-left">
            <h1>TourTech</h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav-white">
                <a href="./cards.html">
                    <h3>HomePage</h3>
                </a>
            </div>

            <div class="btn-nav">

                <h3>Gráficos</h3>

            </div>

            <div class="btn-nav-white">
                <a href="./mural.html">
                    <h3>Funcionarios</h3>
                </a>
            </div>

            <div class="btn-nav-white">
                <a href="./mural.html">
                    <h3>Sugestão</h3>
                </a>
            </div>

            <div class="btn-nav-white">
                <a href="./mural.html">
                    <h3>Suporte</h3>
                </a>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>

        <div class="dash">
            <div class="tituloDash">
                <h1>Dashboards</h1>
            </div>

            <div class="kpis">
                <div class="kpi">
                    KPI1
                </div>
                <div class="kpi">
                    KPI2
                </div>
                <div class="kpi">
                    KPI3
                </div>
                <div class="kpi">
                    KPI4
                </div>
            </div>
            <div class="superior">
                <div class="bar">
                    <canvas id="myChart"></canvas>
                </div>

                <div class="doughnut">
                    <canvas id="myChart2"></canvas>
                </div>
            </div>

            <div class="line">
                <canvas id="myChart3"></canvas>
            </div>

        </div>
    </div>


</body>

</html>

<script>
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

    let proximaAtualizacao;

    const ctx1 = document.getElementById('myChart');
    new Chart(ctx1, {
        type: 'bar',
        data: {
            labels: ['São Paulo', 'Minas Gerais', 'Espírito Santos', 'Goias', 'Distrito Federal', 'Outros'],
            datasets: [{
                label: 'Numero de visitantes',
                data: [12, 19, 3, 5, 2, 3],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                title: {
                    display: true,
                    text: 'Estados que mais vão para o Rio de Janeiro',
                    color: '#000',
                    font: {
                        size: 20,
                        weight: 'bold'
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });

    const ctx2 = document.getElementById('myChart2');

    new Chart(ctx2, {
        type: 'doughnut',
        data: {
            labels: ['Brasil', 'Estados Unidos', 'X', 'Y', 'Z', 'Outros'],
            datasets: [{
                label: 'estrangeiros X brasileiros',
                data: [12, 19, 3, 5, 2, 3],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                title: {
                    display: true,
                    text: 'Número de turistas por país',
                    color: '#000',
                    padding: {
                        top: 10,
                        bottom: 25 // Espaço entre o texto e a linha
                    },
                    font: {
                        size: 20,
                        weight: 'bold'
                    }
                },

            },
            scales: {
                y: {
                    beginAtZero: true,
                    display: false
                }
            }
        }
    });


    const ctx3 = document.getElementById('myChart3');

    new Chart(ctx3, {
        type: 'line',
        data: {
            labels: ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'],
            datasets: [
                {
                    label: '2024',
                    data: [12, 19, 23, 25, 22, 13, 15, 10, 20, 40, 50, 30],
                    borderWidth: 1
                },
                {
                    label: '2025',
                    data: [15, 25, 18, 30, 28, 20, 22, 18, 25, 45, 55, 35],
                    borderWidth: 1
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                title: {
                    display: true,
                    text: 'Número de turistas/mês',
                    color: '#000',
                    font: {
                        size: 20,
                        weight: 'bold'
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });


</script>
