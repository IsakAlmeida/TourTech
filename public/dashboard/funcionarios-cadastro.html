<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TourTech | Cadastro de Funcionarios</title>


    <link rel="stylesheet" href="./../css/funcionarios.css">
    <script src="../js/sessao.js"></script>
    <script src="./../js/alerta.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- scripts do Chart.js - 2022-1 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!--FONT AWESOME-->
    <script src="https://kit.fontawesome.com/9f7414eb10.js" crossorigin="anonymous"></script>
</head>


<body>
    <!--Menu-->
    <div class="janela">

        <div class="header-left">
            <h1>TourTech</h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav-white">
                <a href="./dashboard.html">
                    <h3>Gráficos</h3>
                </a>
            </div>

            <div class="btn-nav">
                <a href="./funcionarios.html"></a>
                <h3>Funcionarios</h3>
                </a>
            </div>

            <div class="btn-nav-white">
                <a href="./mural.html">
                    <h3>Estabelecimento</h3>
                </a>
            </div>

            <div class="btn-nav-white">
                <a href="./mural.html">
                    <h3>Pacotes</h3>
                </a>
            </div>
            <div class="btn-nav-white">
                <a href="./mural.html">
                    <h3>Suporte</h3>
                </a>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>
        <!--Final Menu-->

        
        <main>
            <!--Cadastro-->
            <div class="caixa-cadastro">
                <h1>Cadastrar Funcionários</h1>
                <p>Digite os dados dos funcionários abaixo</p>

                <div class="formato-linha">
                    <div class="campo">
                        <label>Nome</label>
                        <input type="text" placeholder="Digite o nome">
                        <span class="error" id="errorNome"></span>
                    </div>

                    <div class="campo">
                        <label>Sobrenome</label>
                        <input type="text" placeholder="Digite o sobrenome">
                        <span class="error" id="errorSobrenome"></span>
                    </div>
                </div>

                <div class="campo">
                    <label>Email</label>
                    <input type="email" placeholder="Digite o email">
                    <span class="error" id="errorEmail"></span>
                </div>

                <div class="campo">
                    <label>Telefone</label>
                    <input type="text" placeholder="Digite o telefone">
                    <span class="error" id="errorTelefone"></span>
                </div>

                <div class="campo">
                    <label>Cargo</label>
                    <select>
                        <option>Selecione um cargo</option>
                        <option>Gerente</option>
                        <option>Funcionário</option>
                    </select>
                    <span class="error" id="errorCargo"></span>
                </div>

                <div class="campo">
                    <label>Senha</label>
                    <input type="password" placeholder="Digite a senha">
                    <span class="error" id="errorSenha"></span>
                </div>

                <div class="campo">
                    <label>Confirmar Senha</label>
                    <input type="password" placeholder="Confirme a senha">
                    <span class="error" id="errorConfirmacaoSenha"></span>
                </div>
                <div

                <button class="btn-cadastrar">Cadastrar</button>
            </div>
        </main>

</body>

</html>
