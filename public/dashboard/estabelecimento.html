<body onload="listarEstabelecimento()">

            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>
        <!--Final Menu-->
        <main>

            <div class="dash">

                <div class="topo">
                    <h2>Estabelecimento</h2>
                    <div></div>

                    <!-- Ações tabela -->
                    <div class="separacao">

                        <div class="buscar">
                            <input type="text" placeholder="Pesquisa">
                        </div>

                        <div class="acoes">
                            <button class="btn-adicionar" onclick="adicionar()">+ Adicionar</button>
                            <button class="btn-excluir" onclick="excluir()">Excluir</button>
                        </div>
                    </div>

                </div>

                <!-- Tabela -->
                <div class="tabela">

                    <div class="linha descricao">
                        <div class="coluna check">
                            <input type="checkbox" disabled>
                        </div>
                        <div class="coluna">Nome</div>
                        <div class="coluna">Tipo</div>
                        <div class="coluna">Endereço</div>
                        <div class="coluna">Contato</div>
                        <div class="coluna">Email</div>
                        <div class="coluna">MultiLingua</div>
                        <div class="coluna"></div>
                    </div>

                    <!--Lista-->
                    <div id="lista-empresa">
                        <div id="lista"></div>
                    </div>

                    <!--
                    <div class="linha informacao">
                        <div class="coluna check">
                            <input type="checkbox" value="${estabelecimento.id}" data-tipo="${estabelecimento.tipo}">
                        </div>

                        <div class="coluna">
                            patolinos
                        </div>

                        <div class="coluna">
                            <spam class="nivel">
                                alimenticio
                            </spam>
                        </div>

                        <div class="coluna">
                            Rua patolandos
                        </div>

                        <div class="coluna">
                            40028922

                        <div class="coluna">
                            patopolis@patorio.com
                        </div>

                        <div class="coluna">
                            Sim
                        </div>

                        <div class="coluna">
                            <button class="btn-editar" onclick="editar()">
                                Editar
                            </button>
                        </div>
                    </div>
                    -->
                </div>

            </div>

        </main>
        <script>
            b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

            //VAI PARA TELA DE CADASTRO
            function adicionar() {
                window.location = "./estabelecimento-cadastro.html";
            }

            //LISTAR

            function listarEstabelecimento() {

                fetch(`/estabelecimento/listar`)
                    .then(resposta => {
                        if (!resposta.ok) {
                            throw new Error("Erro ao listar Estabelecimento");
                        }
                        return resposta.json();
                    })
                    .then(vt_estabelecimento => {

                        const lista = document.getElementById('lista-empresa');
                        lista.innerHTML = "";

                        vt_estabelecimento.forEach((estabelecimento) => {

                            lista.innerHTML += `
                       <div class="linha informacao">
                            <div class="coluna check">
                                <input type="checkbox" value="${estabelecimento.id}" data-tipo="${estabelecimento.tipo}">
                            </div>

                            <div class="coluna">
                                ${estabelecimento.nome}
                            </div>

                            <div class="coluna">
                                <spam class="nivel">
                                    ${estabelecimento.tipo === 'hospedagem' ? 'Hospedagem' : 'Alimentício'}
                                </spam>
                            </div>

                            <div class="coluna">
                                ${estabelecimento.endereco}
                            </div>

                            <div class="coluna">
                            ${estabelecimento.contato}
                            </div>

                            <div class="coluna">
                            ${estabelecimento.emailComercial}
                            </div>

                            <div class="coluna">
                                ${estabelecimento.multilingue == 1 ? 'Sim' : 'Não'}
                            </div>

                            <div class="coluna">
                                <button class="btn-editar" onclick="editar(${estabelecimento.id}, '${estabelecimento.tipo}')">
                                    Editar
                                </button>
                            </div>
                        </div>
                     `;

                        });
                    })
                    .catch(erro => console.log("Erro em gerar lista de estabelecimento:", erro));

            }

            //EXCLUIR

            function excluir() {
                const checkboxes = document.querySelectorAll('#lista-empresa input[type="checkbox"]:checked');

                if (checkboxes.length == 0) {
                    console.log("Nenhum estabelecimento foi selecionado");
                    return;
                }

                checkboxes.forEach((checkbox) => {
                    const id = checkbox.value;
                    const tipo = checkbox.dataset.tipo;


                    fetch("/estabelecimento/deletar", {
                        method: "DELETE",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            id: id,
                            tipo: tipo
                        })
                    })
                        .then(res => {
                            if (!res.ok) {
                                throw new Error("Erro ao deletar");
                            }
                            return res.json();
                        })
                        .then(() => {
                            console.log("Estabelecimento Deletado:", id);
                            alert("Estabelecimento Deletado com Sucesso!")
                            listarEstabelecimento();
                        })
                        .catch(err => console.log("Erro em deletar estabelecimento:", err));
                });
            }

            //EDITAR
            function editar(id, tipo) {
                sessionStorage.ID_EDITAR = id;
                sessionStorage.TIPO_EDITAR = tipo;
                window.location = "./estabelecimento-editar.html";
            }



        </script>
</body>
