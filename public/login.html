<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/login.css">
    <title>Login - TourTech</title>
    <link rel="Icon" href="./assets/imgs/icon-secondary.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <a href="index.html"><img src="./assets/imgs/icon.png" alt="Logo" class="logo"></a>
    <div class="forms">
        <div class="title">Bem-vindo de volta!</div>
        <div class="campo">
            <label for="login">Login: </label> <br>
            <input type="text" id="iptLogin" placeholder="Digite seu email">
            <span class="error" id="errorLogin"></span>
        </div>
        <div class="campo">
            <label for="senha">Senha: </label> <br>
            <input type="password" id="iptSenha" placeholder="*********">
            <span class="error" id="errorSenha"></span>
            <a onclick="" class="esqueceu-senha">Esqueci minha senha</a>
        </div>
        <span class=loading id="loading"></span>
        <button class="btnEntrar" onclick="entrar()">Entrar</button>
        <div class="call-to-action">
            <p>Ainda não tem uma conta?</p> <a href="cadastro.html" class="ancora">Cadastre-se</a>
        </div>
    </div>
</body>

</html>
<script>
    errorSenha = document.getElementById("errorSenha");
    errorLogin = document.getElementById("errorLogin");
    loading = document.getElementById("loading");

    function entrar() {
        errorLogin.innerHTML = "";
        errorSenha.innerHTML = "";

        var login = iptLogin.value;
        var senha = iptSenha.value;
        var camposValidos = true;

        if (login == "") {
            errorLogin.innerHTML = `Preencha o campo Login!`;
            camposValidos = false;
        }
        if (senha == "") {
            errorSenha.innerHTML = `Preencha o campo Senha!`;
            camposValidos = false;
        }

        if (camposValidos) {
            fetch("/autenticacao/logar", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    emailServer: login,
                    senhaServer: senha
                })
            }).then(function (resposta) {
                console.log("ESTOU NO THEN DO entrar()")

                if (resposta.ok) {
                    console.log(resposta);

                    resposta.json().then(json => {
                        console.log(json);
                        console.log(JSON.stringify(json));
                        sessionStorage.EMAIL_USUARIO = json[0].email;
                        sessionStorage.NOME_USUARIO = json[0].nome;
                        sessionStorage.ID_USUARIO = json[0].idUsuario;
                        sessionStorage.NIVEL_ACESSO = json[0].nivelAcesso;
                        sessionStorage.ID_EMPRESA = json[0].empresaId;

                        loading.style.display = "flex";
                        loading.innerHTML = `<img src="assets/imgs/login/loading.gif">`;
                        setTimeout(function () {
                            window.location = "./dashboard/dashboard.html";
                        }, 1000); // apenas para exibir o loading

                    });

                } else {

                    console.log("Houve um erro ao tentar realizar o login!");

                    if (resposta.status == 403) {
                        errorSenha.innerHTML = `Credenciais inválidas!`;
                    } else {
                        errorSenha.innerHTML = `Usuário já utilizando este sistema!`;
                        }
                    resposta.text().then(texto => {
                        console.error(texto);
                        finalizarAguardar(texto);
                    });
                }
            }).catch(function (erro) {
                console.log(erro);
            })

            return false;
        }


    }
</script>
